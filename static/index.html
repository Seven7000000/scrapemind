<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrapeMind - AI Web Content Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mint: '#10b981',
                        teal: '#14b8a6',
                        dark: { 900: '#0a0f0d', 800: '#111a16', 700: '#1a2722', 600: '#243430' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111a16; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 3px; }
        .md-content h2 { font-size: 1.25rem; font-weight: 700; margin: 1.25rem 0 0.5rem; color: #10b981; }
        .md-content h3 { font-size: 1.05rem; font-weight: 600; margin: 0.75rem 0 0.4rem; color: #14b8a6; }
        .md-content p { margin: 0.4rem 0; line-height: 1.7; }
        .md-content ul, .md-content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
        .md-content li { margin: 0.3rem 0; line-height: 1.6; }
        .md-content strong { color: #d1d5db; }
        .md-content code { background: rgba(16,185,129,0.1); padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body class="bg-dark-900 text-gray-300 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-2">
                <span class="text-mint">Scrape</span><span class="text-teal">Mind</span>
            </h1>
            <p class="text-gray-500">Enter any URL - AI analyzes and summarizes the content</p>
        </div>

        <!-- Input -->
        <div class="bg-dark-800 rounded-xl border border-dark-600 p-6 mb-8">
            <div class="flex flex-col sm:flex-row gap-3 mb-4">
                <input type="text" id="url-input" placeholder="https://example.com/article"
                       class="flex-1 bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-mint transition"
                       onkeydown="if(event.key==='Enter') analyze()">
                <button onclick="analyze()" id="analyze-btn"
                        class="bg-mint/10 border border-mint/30 text-mint px-8 py-3 rounded-lg hover:bg-mint/20 transition font-medium text-sm whitespace-nowrap">
                    Analyze
                </button>
            </div>
            <div class="flex flex-wrap gap-2">
                <label class="text-xs text-gray-500 self-center mr-1">Analysis:</label>
                <button onclick="setType('summary')" id="type-summary" class="type-btn text-xs px-3 py-1 rounded-full border border-mint/40 text-mint bg-mint/10">Summary</button>
                <button onclick="setType('key_points')" id="type-key_points" class="type-btn text-xs px-3 py-1 rounded-full border border-dark-600 text-gray-400 hover:border-mint/40 transition">Key Points</button>
                <button onclick="setType('sentiment')" id="type-sentiment" class="type-btn text-xs px-3 py-1 rounded-full border border-dark-600 text-gray-400 hover:border-mint/40 transition">Sentiment</button>
                <button onclick="setType('full')" id="type-full" class="type-btn text-xs px-3 py-1 rounded-full border border-dark-600 text-gray-400 hover:border-mint/40 transition">Full Analysis</button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden text-center py-16">
            <div class="inline-flex flex-col items-center gap-4">
                <div class="w-10 h-10 border-3 border-mint border-t-transparent rounded-full animate-spin" style="border-width:3px"></div>
                <div>
                    <p class="text-gray-400 font-medium">Scraping & analyzing...</p>
                    <p class="text-gray-600 text-sm mt-1">Fetching content and running AI analysis</p>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden fade-in space-y-6">
            <!-- Page Info -->
            <div class="bg-dark-800 rounded-xl border border-dark-600 p-5">
                <h2 class="font-semibold text-gray-200 text-sm mb-3">Page Information</h2>
                <div class="space-y-2">
                    <div class="flex items-start gap-2">
                        <span class="text-xs text-gray-500 w-16 shrink-0 pt-0.5">Title</span>
                        <span class="text-sm text-gray-300" id="res-title"></span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-xs text-gray-500 w-16 shrink-0 pt-0.5">Meta</span>
                        <span class="text-sm text-gray-400" id="res-meta"></span>
                    </div>
                    <div class="flex gap-4 mt-2">
                        <div class="bg-dark-700 rounded-lg px-3 py-2 text-center">
                            <div class="text-lg font-bold text-mint" id="res-words">0</div>
                            <div class="text-xs text-gray-500">Words</div>
                        </div>
                        <div class="bg-dark-700 rounded-lg px-3 py-2 text-center">
                            <div class="text-lg font-bold text-teal" id="res-headings">0</div>
                            <div class="text-xs text-gray-500">Headings</div>
                        </div>
                        <div class="bg-dark-700 rounded-lg px-3 py-2 text-center">
                            <div class="text-lg font-bold text-emerald-400" id="res-links">0</div>
                            <div class="text-xs text-gray-500">Links</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Analysis -->
            <div class="bg-dark-800 rounded-xl border border-dark-600 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-semibold text-gray-200">AI Analysis</h2>
                    <button onclick="copyAnalysis()" class="text-xs bg-dark-600 hover:bg-dark-700 text-gray-400 hover:text-mint px-3 py-1.5 rounded-lg transition">Copy</button>
                </div>
                <div id="res-analysis" class="md-content text-sm text-gray-300 leading-relaxed"></div>
            </div>
        </div>
    </div>

    <script>
        let analysisType = 'summary';
        let rawAnalysis = '';

        function setType(type) {
            analysisType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                const isActive = btn.id === 'type-' + type;
                btn.className = 'type-btn text-xs px-3 py-1 rounded-full border transition ' +
                    (isActive ? 'border-mint/40 text-mint bg-mint/10' : 'border-dark-600 text-gray-400 hover:border-mint/40');
            });
        }

        async function analyze() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) { alert('Please enter a URL'); return; }

            const btn = document.getElementById('analyze-btn');
            btn.disabled = true;
            btn.textContent = 'Analyzing...';
            document.getElementById('results').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, analysis_type: analysisType })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Analysis failed');
                }
                const data = await res.json();
                rawAnalysis = data.analysis;

                document.getElementById('res-title').textContent = data.title || 'No title found';
                document.getElementById('res-meta').textContent = data.meta_description || 'No meta description';
                document.getElementById('res-words').textContent = data.word_count.toLocaleString();
                document.getElementById('res-headings').textContent = data.headings_count;
                document.getElementById('res-links').textContent = data.links_count;
                document.getElementById('res-analysis').innerHTML = formatMarkdown(data.analysis);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');
            } catch (err) {
                alert('Error: ' + err.message);
                document.getElementById('loading').classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Analyze';
            }
        }

        function copyAnalysis() {
            navigator.clipboard.writeText(rawAnalysis);
        }

        function formatMarkdown(text) {
            return text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre class="bg-dark-900 p-3 rounded-lg my-2 overflow-x-auto text-xs"><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1 class="text-xl font-bold text-mint my-3">$1</h1>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/^(\d+)\. (.+)$/gm, '<li class="list-decimal">$2</li>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
